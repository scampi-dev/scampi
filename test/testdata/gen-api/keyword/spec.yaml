openapi: "3.0.0"
info:
  title: Keyword Test API
  version: "1.0"
paths:
  /rules:
    post:
      operationId: createRule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                enum:
                  type: string
              required:
                - name
                - type
    get:
      operationId: listRules
  /rules/{type}:
    get:
      operationId: getRuleByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
