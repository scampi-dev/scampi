name: CI

on:
  push:
    branches: [main]
    # Skip CI on bot-driven bench commits to avoid an infinite loop:
    # the bench job below pushes to benchmarks/ on main, which would
    # otherwise re-trigger CI.
    paths-ignore:
      - 'benchmarks/**'
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4
      - run: just test everything
      - run: just lint

  bench:
    # Record a bench baseline only after main pushes pass, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: scampi
    env:
      # Force UTC for all timestamps so filenames + commit messages are
      # consistent regardless of the runner host's TZ.
      TZ: UTC
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Compute suffix and timestamp
        id: meta
        run: |
          echo "suffix=ci-forgejo-$(hostname)" >> "$GITHUB_OUTPUT"
          echo "ts=$(date '+%Y-%m-%dT%H%M')" >> "$GITHUB_OUTPUT"

      - name: Record benchmark baseline
        # SCAMPI_BENCH_TS pins the filename timestamp to the same value
        # we use for the commit message, so filename and commit-msg ts
        # match exactly instead of drifting by the bench runtime.
        env:
          SCAMPI_BENCH_TS: ${{ steps.meta.outputs.ts }}
        run: just test bench ${{ steps.meta.outputs.suffix }}

      - name: Compare against previous baseline
        # Non-fatal: first run for a new suffix has nothing to compare,
        # and regression auto-fail is a follow-up. Output lands in the
        # job log either way.
        run: just test benchcomp ${{ steps.meta.outputs.suffix }} || true

      - name: Commit and push baseline
        run: |
          set -euo pipefail
          git config user.name "scampi-bench-bot"
          git config user.email "bench-bot@scampi.dev"
          git add benchmarks/
          if git diff --cached --quiet; then
            echo "No new benchmark file"
            exit 0
          fi
          git commit -m "ci: bench baseline ${{ steps.meta.outputs.ts }} for ${{ steps.meta.outputs.suffix }}"
          # Rebase in case main moved during the bench run.
          git pull --rebase origin main
          git push

      - name: Publish raw bench data to Caddy
        # Runner is on the same VPS as Caddy (see .infra/runner.scampi
        # and .infra/site.scampi). The target dir is owned by
        # forgejo-runner so we can write directly without SSH/rsync
        # over the network. --delete keeps the published copy in sync
        # with git (renames + size-10000 strip etc. propagate cleanly).
        run: |
          set -euo pipefail
          suffix="${{ steps.meta.outputs.suffix }}"
          target="/var/www/scampi.dev/raw-bench/${suffix}"
          install -d "$target"
          rsync -a --delete --include='*-'"$suffix"'.txt' --exclude='*' \
            benchmarks/ "$target/"
          # Manifest the JS dashboard consumes: chronologically sorted
          # list of filenames in the suffix's directory.
          (cd "$target" && ls -1 *-"$suffix".txt | jq -R . | jq -s .) > "$target/index.json"
