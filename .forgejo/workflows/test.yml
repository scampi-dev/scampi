name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: codeberg-small
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install tools
        run: |
          curl -sSfL https://github.com/casey/just/releases/download/1.46.0/just-1.46.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xzf - -C /usr/local/bin just
          apt-get update -qq && apt-get install -y -qq shellcheck

      - run: just build
      - run: just test race
      - run: just lint
