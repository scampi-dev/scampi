name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag is not on main — refusing to release"
            exit 1
          fi
      - run: just build
      - run: just test race
      - run: just lint

  release:
    needs: test
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${TAG}"
          mkdir -p release
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            BINARY="scampi-${TAG}-${GOOS}-${GOARCH}"
            echo "==> Building ${BINARY}..."
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags "${LDFLAGS}" -o "release/${BINARY}" ./cmd
            (cd release && sha256sum "${BINARY}" | tee "${BINARY}.sha256")
          done
          echo "==> All binaries built"
          ls -lh release/

      - name: Create release and upload assets
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          API="https://codeberg.org/api/v1"
          REPO="scampi-dev/scampi"
          AUTH="Authorization: token ${RELEASE_TOKEN}"

          # Determine pre-release status
          PRERELEASE=false
          case "$TAG" in *-*) PRERELEASE=true ;; esac

          # Create release
          BODY=$(cat <<EOF
          ## scampi ${TAG}

          ### Binaries

          | Platform     | Binary                                     |
          | ------------ | ------------------------------------------ |
          | Linux x86_64 | \`scampi-${TAG}-linux-amd64\`              |
          | Linux ARM64  | \`scampi-${TAG}-linux-arm64\`              |
          | macOS x86_64 | \`scampi-${TAG}-darwin-amd64\`             |
          | macOS ARM64  | \`scampi-${TAG}-darwin-arm64\`             |

          Each binary has a corresponding \`.sha256\` checksum file.
          EOF
          )

          echo "==> Creating release ${TAG}..."
          RELEASE_ID=$(curl -sf -X POST \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$TAG" --arg body "$BODY" --argjson pre "$PRERELEASE" \
              '{tag_name: $tag, name: $tag, body: $body, prerelease: $pre}')" \
            "$API/repos/$REPO/releases" | jq -r '.id')

          echo "    Release ID: ${RELEASE_ID}"

          # Upload assets
          for file in release/*; do
            name=$(basename "$file")
            echo "==> Uploading ${name}..."
            curl -sf -X POST \
              -H "$AUTH" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "$API/repos/$REPO/releases/${RELEASE_ID}/assets?name=${name}"
            echo ""
          done

          echo "==> Release ${TAG} published"
