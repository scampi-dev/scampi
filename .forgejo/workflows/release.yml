name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4
      - run: just test everything
      - run: just lint

  release:
    needs: test
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release binaries
        run: |
          just cross release
          (cd release && sha256sum * | tee SHA256SUMS)
          ls -lh release/

      - name: Create release and upload assets
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CODEBERG_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          API="https://codeberg.org/api/v1"
          REPO="scampi-dev/scampi"

          # Determine pre-release status
          PRERELEASE=false
          case "$TAG" in *-*) PRERELEASE=true ;; esac

          # Generate release notes
          echo "==> Generating release notes..."
          BODY=$(./scripts/release-notes.sh "$API" "$REPO" --refresh)
          echo "$BODY"

          # Create release
          echo "==> Creating release ${TAG}..."
          PAYLOAD=$(jq -n --arg tag "$TAG" --arg body "$BODY" --argjson pre "$PRERELEASE" \
            '{tag_name: $tag, name: $tag, body: $body, prerelease: $pre}')

          HTTP_CODE=$(curl -s -o /tmp/release-response.json -w '%{http_code}' -X POST \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API/repos/$REPO/releases")

          echo "    HTTP ${HTTP_CODE}"
          cat /tmp/release-response.json | jq .

          if [[ "$HTTP_CODE" -ge 400 ]]; then
            echo "::error::Release creation failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          RELEASE_ID=$(jq -r '.id' /tmp/release-response.json)

          # Upload assets
          for file in release/*; do
            name=$(basename "$file")
            echo "==> Uploading ${name}..."
            HTTP_CODE=$(curl -s -o /tmp/upload-response.json -w '%{http_code}' -X POST \
              -H "Authorization: token ${RELEASE_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "$API/repos/$REPO/releases/${RELEASE_ID}/assets?name=${name}")
            echo "    HTTP ${HTTP_CODE}"
            if [[ "$HTTP_CODE" -ge 400 ]]; then
              cat /tmp/upload-response.json
              echo "::error::Upload of ${name} failed with HTTP ${HTTP_CODE}"
              exit 1
            fi
          done

          echo "==> Release ${TAG} published"
