name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: scampi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${TAG}"
          mkdir -p release
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            BINARY="scampi-${TAG}-${GOOS}-${GOARCH}"
            echo "==> Building ${BINARY}..."
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags "${LDFLAGS}" -o "release/${BINARY}" ./cmd
            (cd release && sha256sum "${BINARY}" | tee "${BINARY}.sha256")
          done
          echo "==> All binaries built"
          ls -lh release/

      - name: Create release and upload assets
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CODEBERG_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          API="https://codeberg.org/api/v1"
          REPO="scampi-dev/scampi"
          AUTH="Authorization: token ${RELEASE_TOKEN}"

          # Determine pre-release status
          PRERELEASE=false
          case "$TAG" in *-*) PRERELEASE=true ;; esac

          # Generate release notes
          BODY=$(./scripts/release-notes.sh "$API" "$REPO" --refresh)

          echo "==> Creating release ${TAG}..."
          PAYLOAD=$(jq -n --arg tag "$TAG" --arg body "$BODY" --argjson pre "$PRERELEASE" \
            '{tag_name: $tag, name: $tag, body: $body, prerelease: $pre}')

          RESPONSE=$(curl -sS --fail-with-body -X POST \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API/repos/$REPO/releases")
          echo "$RESPONSE" | jq .
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')

          # Upload assets
          for file in release/*; do
            name=$(basename "$file")
            echo "==> Uploading ${name}..."
            curl -sS --fail-with-body -X POST \
              -H "$AUTH" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "$API/repos/$REPO/releases/${RELEASE_ID}/assets?name=${name}" \
              | jq -r '.name'
          done

          echo "==> Release ${TAG} published"
