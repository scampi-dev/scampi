name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Build release binaries
        run: |
          just cross release
          (cd release && sha256sum * | tee SHA256SUMS)
          ls -lh release/

      - name: Sign SHA256SUMS
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          install -m 0600 /dev/stdin /tmp/release-signing.key <<<"$SIGNING_KEY"
          ssh-keygen -Y sign -f /tmp/release-signing.key -n file release/SHA256SUMS
          rm /tmp/release-signing.key
          ls -lh release/SHA256SUMS.sig

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Extract the section for this tag from CHANGELOG.md.
          # Matches from "## <tag>" until the next "## " heading or EOF.
          {
            echo "## What's Changed"
            echo ""
            awk -v tag="$TAG" '
              $0 ~ "^## " tag " " { found=1; next }
              found && /^## /     { exit }
              found               { print }
            ' CHANGELOG.md
          } > /tmp/notes-raw.md

          # Escape @ to prevent user mentions from issue titles.
          sed -E 's/@([a-zA-Z][a-zA-Z0-9_]*)/`@\1`/g' /tmp/notes-raw.md > /tmp/notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) echo "value=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: /tmp/notes.md
          prerelease: ${{ steps.prerelease.outputs.value }}
          fail_on_unmatched_files: true
