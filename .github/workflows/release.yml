name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Build release binaries
        run: |
          just cross release
          (cd release && sha256sum * | tee SHA256SUMS)
          ls -lh release/

      - name: Sign SHA256SUMS
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          install -m 0600 /dev/stdin /tmp/release-signing.key <<<"$SIGNING_KEY"
          ssh-keygen -Y sign -f /tmp/release-signing.key -n file release/SHA256SUMS
          rm /tmp/release-signing.key
          ls -lh release/SHA256SUMS.sig

      - name: Determine prerelease
        id: prerelease
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) echo "value=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          fail_on_unmatched_files: true
