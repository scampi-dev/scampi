name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Build release binaries
        run: |
          just cross release
          (cd release && sha256sum * | tee SHA256SUMS)
          ls -lh release/

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Extract the section for this tag from CHANGELOG.md.
          # Matches from "## <tag>" until the next "## " heading or EOF.
          {
            echo "## What's Changed"
            echo ""
            awk -v tag="$TAG" '
              $0 ~ "^## " tag " " { found=1; next }
              found && /^## /     { exit }
              found               { print }
            ' CHANGELOG.md
          } > /tmp/notes-raw.md

          # Rewrite (#N) issue refs to point at Codeberg, since GitHub's
          # auto-linking would 404 (issues are disabled on the mirror).
          # Escape @ to prevent GitHub user mentions (e.g. @name in issue titles).
          sed -E \
            -e 's|\(#([0-9]+)\)|([#\1](https://codeberg.org/scampi-dev/scampi/issues/\1))|g' \
            -e 's/@([a-zA-Z][a-zA-Z0-9_]*)/`@\1`/g' \
            /tmp/notes-raw.md > /tmp/notes.md

          {
            echo ""
            echo "---"
            echo ""
            echo "Released from [Codeberg](https://codeberg.org/scampi-dev/scampi/releases/tag/${TAG}). The GitHub repository is a read-only mirror — issues and pull requests should be filed on Codeberg."
          } >> /tmp/notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) echo "value=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: /tmp/notes.md
          prerelease: ${{ steps.prerelease.outputs.value }}
          fail_on_unmatched_files: true
