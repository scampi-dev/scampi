name: Release

# Triggered by CI completing successfully on main. If the head commit
# carries a release tag (v*), build and publish a GitHub release.
# Non-release CI runs go through the `detect` job and exit cheaply.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  detect:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.find.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - id: find
        name: Find release tag at HEAD
        run: |
          tag=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -n 1 || true)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ -z "$tag" ]; then
            echo "no release tag at $(git rev-parse --short HEAD) -- skipping release"
          else
            echo "release tag at HEAD: $tag"
          fi

  release:
    needs: detect
    if: needs.detect.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Build release binaries
        run: |
          just cross release
          (cd release && sha256sum * | tee SHA256SUMS)
          ls -lh release/

      - name: Sign SHA256SUMS
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          install -m 0600 /dev/stdin /tmp/release-signing.key <<<"$SIGNING_KEY"
          ssh-keygen -Y sign -f /tmp/release-signing.key -n file release/SHA256SUMS
          rm /tmp/release-signing.key
          ls -lh release/SHA256SUMS.sig

      - name: Determine prerelease
        id: prerelease
        run: |
          case "${{ needs.detect.outputs.tag }}" in
            *-*) echo "value=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          files: release/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          fail_on_unmatched_files: true
