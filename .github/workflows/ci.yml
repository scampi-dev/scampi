name: CI

on:
  push:
    branches: [main]
    # Bench commits land in benchmarks/ and shouldn't re-trigger CI.
    paths-ignore:
      - 'benchmarks/**'
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Test (everything, includes container-gated)
        run: just test everything

      - name: Lint
        run: just lint
