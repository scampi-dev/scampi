name: Mirror to Codeberg

# Pushes git refs to the Codeberg backup mirror on every push to main
# and on tag pushes. Codeberg is a passive code-only backup — issues,
# releases, etc. live on GitHub.

on:
  push:
    # Only trigger on main pushes (not on tag pushes). Atomic pushes of
    # main + tag fire two webhook events, both starting simultaneously,
    # and racing each other to push to CB — the queue-on-in-progress
    # concurrency rule doesn't help when both are queued at the same
    # tick. The push step below pushes refs/heads/* AND refs/tags/* in
    # one git push, so the tag travels with the main push.
    branches: [main]

# Belt-and-suspenders: even with a single trigger above, manual
# workflow_dispatch / re-runs / out-of-band tag pushes should serialize.
concurrency:
  group: mirror-to-cb
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key for codeberg.org
        env:
          HAL9000_SSH_KEY: ${{ secrets.HAL9000_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if [ -z "$HAL9000_SSH_KEY" ]; then
            echo "HAL9000_SSH_KEY secret is empty — add it under repo Settings -> Secrets"
            exit 1
          fi
          printf '%s\n' "$HAL9000_SSH_KEY" > ~/.ssh/hal9000_key
          chmod 600 ~/.ssh/hal9000_key
          # ssh-keyscan codeberg.org from GH-Actions runners hits its
          # ~5s timeout before the handshake completes (the actual
          # connection takes longer than that even when it succeeds).
          # Skip the keyscan and let StrictHostKeyChecking=accept-new
          # populate known_hosts on first connect instead.
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/hal9000_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" >> "$GITHUB_ENV"

      - name: Verify SSH auth to codeberg.org
        run: |
          # Codeberg's SSH endpoint returns the welcome banner and exits
          # 1 (no shell available for users), which is the success case.
          # An auth failure exits 255 instead. We treat anything non-255
          # as success.
          #
          # Pass the SSH flags explicitly — GIT_SSH_COMMAND is only read
          # by git, not by a bare `ssh` invocation, so we'd otherwise hit
          # "Host key verification failed" on first connect.
          set +e
          ssh -i ~/.ssh/hal9000_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o BatchMode=yes \
              -T git@codeberg.org
          rc=$?
          if [ $rc -eq 255 ]; then
            echo "SSH auth to codeberg.org FAILED (exit 255)"
            exit 1
          fi
          echo "SSH auth ok (exit $rc — non-255 means banner returned)"

      - name: Clone GitHub source (mirror)
        run: |
          git clone --mirror "https://github.com/${{ github.repository }}.git" repo

      - name: Push refs to Codeberg
        working-directory: repo
        run: |
          git remote add cb "git@codeberg.org:${{ github.repository }}.git"
          # Push branches + tags explicitly. --mirror would also push
          # refs/pull/* (GH's internal PR refs), which other forges reject
          # as hidden refs. --prune deletes refs on CB that no longer
          # exist on GH so the mirror stays in sync on branch deletes.
          # --force because GH is the source of truth: if a tag moved
          # (e.g. mid-migration retags) or a branch was force-pushed,
          # CB should follow rather than reject.
          git push --prune --force cb \
            "refs/heads/*:refs/heads/*" \
            "refs/tags/*:refs/tags/*"
