name: Mirror to Codeberg

# Pushes git refs to the Codeberg backup mirror on every push to main
# and on tag pushes. Codeberg is a passive code-only backup — issues,
# releases, etc. live on GitHub.

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key for codeberg.org
        env:
          CB_MIRROR_KEY: ${{ secrets.CB_MIRROR_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if [ -z "$CB_MIRROR_KEY" ]; then
            echo "CB_MIRROR_KEY secret is empty — add it under repo Settings -> Secrets"
            exit 1
          fi
          printf '%s\n' "$CB_MIRROR_KEY" > ~/.ssh/cb_mirror_key
          chmod 600 ~/.ssh/cb_mirror_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts 2>/dev/null
          echo "GIT_SSH_COMMAND=ssh -i $HOME/.ssh/cb_mirror_key -o IdentitiesOnly=yes" >> "$GITHUB_ENV"

      - name: Verify SSH auth to codeberg.org
        run: |
          # `ssh -T git@codeberg.org` returns 0 + "Hi <user>!" on success,
          # 255 on auth failure. We want the per-step failure to land here,
          # not later inside the cryptic `git push` error.
          ssh -o BatchMode=yes -T git@codeberg.org || true
          ssh -o BatchMode=yes -o ExitOnForwardFailure=yes -T git@codeberg.org

      - name: Clone GitHub source (mirror)
        run: |
          git clone --mirror "https://github.com/${{ github.repository }}.git" repo

      - name: Push refs to Codeberg
        working-directory: repo
        run: |
          git remote add cb "git@codeberg.org:${{ github.repository }}.git"
          # Push branches + tags explicitly. --mirror would also push
          # refs/pull/* (GH's internal PR refs), which other forges reject
          # as hidden refs. --prune deletes refs on CB that no longer
          # exist on GH so the mirror stays in sync on branch deletes.
          git push --prune cb \
            "refs/heads/*:refs/heads/*" \
            "refs/tags/*:refs/tags/*"
