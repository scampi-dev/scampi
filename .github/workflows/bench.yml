name: Bench

# Bench runs only on the VPS self-hosted runner (consistent hardware =
# stable measurements). Triggered after a successful CI run on main —
# avoids recording a baseline from a broken commit.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  bench:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: [self-hosted, vps]
    permissions:
      contents: write
    env:
      # UTC so the filename + commit-message timestamp are consistent
      # regardless of the runner host's TZ.
      TZ: UTC
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the SHA the CI run was on, not the workflow_run's
          # default (which is the default branch HEAD).
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Compute suffix and timestamp
        id: meta
        run: |
          echo "suffix=ci-gh-$(hostname)" >> "$GITHUB_OUTPUT"
          echo "ts=$(date '+%Y-%m-%dT%H%M')" >> "$GITHUB_OUTPUT"

      - name: Record benchmark baseline
        env:
          # SCAMPI_BENCH_TS pins the filename timestamp to the same value
          # we use for the commit message, so filename and commit-msg ts
          # match exactly instead of drifting by the bench runtime.
          SCAMPI_BENCH_TS: ${{ steps.meta.outputs.ts }}
        run: just test bench ${{ steps.meta.outputs.suffix }}

      - name: Compare against previous baseline
        # Non-fatal: first run for a new suffix has nothing to compare,
        # and regression auto-fail is a follow-up. Output lands in the
        # job log either way.
        run: just test benchcomp ${{ steps.meta.outputs.suffix }} || true

      - name: Commit and push baseline
        run: |
          set -euo pipefail
          git config user.name "scampi-bench-bot"
          git config user.email "bench-bot@scampi.dev"
          git add benchmarks/
          if git diff --cached --quiet; then
            echo "No new benchmark file"
            exit 0
          fi
          git commit -m "ci: bench baseline ${{ steps.meta.outputs.ts }} for ${{ steps.meta.outputs.suffix }}"
          # Checkout above is by SHA, so HEAD is detached. Push the new
          # bench commit explicitly to main; rebase first in case main
          # has moved since.
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish raw bench data to Caddy
        # Runner is on the same VPS as Caddy. /var/www/scampi.dev/raw-bench
        # is owned by actions-runner (see .infra/site.scampi) so we can
        # write directly without SSH/rsync over the network. --delete
        # keeps the published copy in sync with git.
        run: |
          set -euo pipefail
          suffix="${{ steps.meta.outputs.suffix }}"
          target="/var/www/scampi.dev/raw-bench/${suffix}"
          install -d "$target"
          rsync -a --delete --include='*-'"$suffix"'.txt' --exclude='*' \
            benchmarks/ "$target/"
          # Manifest the JS dashboard consumes: chronologically sorted
          # list of filenames in the suffix's directory.
          (cd "$target" && ls -1 *-"$suffix".txt | jq -R . | jq -s .) > "$target/index.json"
