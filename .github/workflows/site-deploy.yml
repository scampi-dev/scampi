name: Site Deploy

# Build the docs site and deploy it to the VPS Caddy dir whenever a
# release is published. Runs on ubuntu-latest — only bench needs the
# self-hosted VPS runner for measurement stability; this is just a
# build + ssh-push.

on:
  # Triggered when the Release workflow completes. The Release workflow
  # itself uses a detect+release pattern that runs (and reports success)
  # on every CI completion regardless of whether a tag was present, so
  # we have to repeat the tag-at-HEAD check here. workflow_run is the
  # documented gate-on-another-workflow pattern; the release-event
  # types (`published` / `prereleased`) aren't emitted consistently by
  # softprops/action-gh-release.
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

jobs:
  detect:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.find.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: find
        name: Find release tag at HEAD
        run: |
          tag=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -n 1 || true)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ -z "$tag" ]; then
            echo "no release tag at $(git rev-parse --short HEAD) -- skipping site deploy"
          else
            echo "release tag at HEAD: $tag"
          fi

  deploy:
    needs: detect
    if: needs.detect.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Build scampi
        run: just build

      - name: Build and package site
        # `go tool hugo` works via go.mod's tool directive, so no
        # separate Hugo install needed.
        run: just site dist

      - name: Checkout scampi-infra
        run: git clone https://github.com/scampi-dev/scampi-infra.git scampi-infra

      - name: Deploy site via scampi
        env:
          SCAMPI_AGE_KEY: ${{ secrets.AGE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.HAL9000_SSH_KEY }}" > ~/.ssh/hal9000
          chmod 600 ~/.ssh/hal9000
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/hal9000

          HOST=$(./build/bin/scampi secrets get -f scampi-infra/secrets.age.json vps.host)
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          cp build/site-dist/site.tar.gz scampi-infra/files/site.tar.gz
          cd scampi-infra && ../build/bin/scampi apply site.scampi
