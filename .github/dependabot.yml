version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # Separate go.mod: the root entry doesn't reach it.
  - package-ecosystem: "gomod"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      site-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        applies-to: version-updates
        update-types: ["minor", "patch", "major"]
