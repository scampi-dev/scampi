version: 2
updates:
  # Go module updates -- weekly batched.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types: [patch, minor]

  # GitHub Actions version bumps -- weekly.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
